<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Billing System{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid #ccc; }
        h1, h2, h3 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f0f0f0; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 180px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="number"] {
            padding: 5px; border: 1px solid #ccc; width: 200px;
        }
        button, .btn {
            padding: 8px 16px; margin: 5px; cursor: pointer;
            border: 1px solid #888; background: #e0e0e0; text-decoration: none; color: #000;
        }
        button:hover, .btn:hover { background: #d0d0d0; }
        .btn-primary { background: #4CAF50; color: white; border-color: #4CAF50; }
        .btn-primary:hover { background: #45a049; }
        hr { margin: 20px 0; }
        .actions { text-align: right; margin-top: 15px; }
        nav { margin-bottom: 20px; text-align: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #333; font-weight: bold; }
        nav a:hover { color: #4CAF50; }
        .summary-table { width: auto; margin: 20px auto; }
        .summary-table td { border: none; padding: 4px 12px; }
        .summary-table td:first-child { text-align: right; font-weight: bold; }
        .error { color: red; text-align: center; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <nav>
            <a href="/billing">Billing</a>
            <a href="/products">Products</a>
            <a href="/history">Purchase History</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
